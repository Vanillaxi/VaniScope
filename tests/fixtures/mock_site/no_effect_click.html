<!doctype html>
<html>
<head>

  <title>VaniScope No Effect Click Mock</title>
</head>
<body>
  <h1>VaniScope No Effect Click Mock</h1>
  <button id="quickstart" onclick="
    window.quickstartClicks = (window.quickstartClicks || 0) + 1;
    if (window.quickstartClicks >= 2) {
      document.getElementById('install').style.display='block';
    }
  ">
    Quickstart
  </button>

  <section id="install" style="display:none">
    <h2>Install</h2>
    <code>pip install playwright</code>
  </section>
</body>
