<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VaniScope Lazy Button Mock</title>
</head>
<body>
  <h1>VaniScope Lazy Button Mock</h1>
  <p id="status">Loading controls...</p>

  <div id="button-slot"></div>

  <section id="install" style="display:none">
    <h2>Install</h2>
    <code>pip install playwright</code>
  </section>

  <script>
    setTimeout(() => {
      const button = document.createElement('button');
      button.id = 'quickstart';
      button.textContent = 'Quickstart';
      button.onclick = () => {
        document.getElementById('install').style.display = 'block';
      };
      document.getElementById('button-slot').appendChild(button);
      document.getElementById('status').textContent = 'Controls ready';
    }, 900);
  </script>
</body>
</html>
