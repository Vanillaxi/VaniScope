<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Early Button Hydration</title>
</head>
<body>
  <main>
    <h1>Early Button Fixture</h1>
    <button id="early">Quickstart</button>
    <section id="result" hidden>pip install playwright</section>
  </main>
  <script>
    let hydrated = false;
    setTimeout(() => { hydrated = true; }, 1600);
    document.getElementById('early').addEventListener('click', () => {
      if (!hydrated) return;
      document.getElementById('result').hidden = false;
    });
  </script>
</body>
</html>
