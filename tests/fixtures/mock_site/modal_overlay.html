<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VaniScope Modal Overlay Mock</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 32px;
    }

    #overlay {
      align-items: center;
      background: rgba(20, 24, 32, 0.58);
      display: flex;
      inset: 0;
      justify-content: center;
      position: fixed;
      z-index: 10;
    }

    #modal {
      background: white;
      border: 1px solid #ccd2dc;
      padding: 24px;
      width: 280px;
    }
  </style>
</head>
<body>
  <h1>VaniScope Modal Overlay Mock</h1>
  <button id="quickstart" onclick="document.getElementById('install').style.display='block'">
    Quickstart
  </button>

  <section id="install" style="display:none">
    <h2>Install</h2>
    <code>pip install playwright</code>
  </section>

  <div id="overlay" aria-modal="true" role="dialog">
    <div id="modal">
      <h2>Before you continue</h2>
      <p>This modal blocks the page until dismissed.</p>
      <button id="close-modal" onclick="document.getElementById('overlay').remove()">
        Close
      </button>
    </div>
  </div>
</body>
</html>
