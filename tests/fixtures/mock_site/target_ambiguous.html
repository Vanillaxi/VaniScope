<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VaniScope Ambiguous Target Mock</title>
</head>
<body>
  <h1>VaniScope Ambiguous Target Mock</h1>
  <p>Two similar controls are present; only the docs control reveals the expected content.</p>

  <button id="quickstart-empty" onclick="
    window.genericQuickstartClicks = (window.genericQuickstartClicks || 0) + 1;
    document.getElementById('status').textContent = 'Generic quickstart clicked';
    if (window.genericQuickstartClicks >= 2) {
      document.getElementById('install').style.display='block';
    }
  ">
    Quickstart
  </button>

  <button id="quickstart-docs" onclick="
    document.getElementById('install').style.display='block';
  ">
    Quickstart
  </button>

  <p id="status"></p>

  <section id="install" style="display:none">
    <h2>Install</h2>
    <code>pip install playwright</code>
  </section>
</body>
</html>
