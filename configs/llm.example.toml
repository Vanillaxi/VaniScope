# VaniScope LLM provider config example.
# Copy this file to configs/llm.local.toml for local real-provider testing.
# Do not put real API keys in this example file.

[router]
default_provider = "fake"
default_model = "fake-planner"
mode = "fake"

[budget]
max_prompt_tokens = 12000
max_completion_tokens = 2000
max_total_tokens_per_task = 50000
max_llm_calls_per_task = 20
timeout_seconds = 60

[providers.fake]
type = "fake"
model = "fake-planner"

[providers.openai]
type = "openai_compatible"
base_url = "https://api.openai.com/v1"
api_key = "replace-me"
model = "gpt-4.1"

[providers.deepseek]
type = "openai_compatible"
base_url = "https://api.deepseek.com/v1"
api_key = "replace-me"
model = "deepseek-chat"

[providers.glm]
type = "openai_compatible"
base_url = "replace-me"
api_key = "replace-me"
model = "replace-me"
