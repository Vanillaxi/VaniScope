# VaniScope LLM provider config example.
# Copy this file to configs/llm.local.toml for local real-provider testing.
# Do not put real API keys in this example file.

[router]
mode = "fake"
default_provider = "fake"
default_model = "fake-planner"

[budget]
max_calls_per_task = 12
max_llm_calls_per_task = 12

# Per-call technical prompt ceiling. Prompts above this are compacted before
# being sent to the provider.
max_prompt_tokens_per_call = 12000
max_prompt_tokens = 12000

# Task-level prompt budget layers.
soft_prompt_tokens_per_task = 30000
approval_prompt_tokens_per_task = 50000
hard_prompt_tokens_per_task = 80000

max_completion_tokens_per_call = 2048
max_completion_tokens = 2048
max_completion_tokens_per_task = 12000
max_total_tokens_per_task = 50000

soft_cost_usd_per_task = 0.15
approval_cost_usd_per_task = 0.30
hard_cost_usd_per_task = 0.60
max_cost_usd_per_task = 0.60

enable_budget_approval = true
enable_auto_compaction = true
timeout_seconds = 60

[llm]
# Provider read timeouts are retried once before the task asks the user what to do.
max_retries_per_call = 1
retry_on_timeout = true

[providers.fake]
type = "fake"
model = "fake-planner"

[providers.openai_compatible]
type = "openai_compatible"
base_url = "https://api.openai.com/v1"
api_key = "YOUR_API_KEY_HERE"
model = "gpt-4.1-mini"
fallback_model = "gpt-4.1-nano"
timeout_seconds = 30

# Alibaba Cloud DashScope / Qwen. Set DASHSCOPE_API_KEY before selecting this
# provider in [router].
[providers.qwen]
type = "openai_compatible"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key_env = "DASHSCOPE_API_KEY"
model = "qwen-plus"
fallback_model = "qwen-turbo"
timeout_seconds = 90
